<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Card</title>
  <link rel="stylesheet" href="trainer-card.css">
</head>
<body>
  <div class="trainer-card">
    <div class="header">
      <h2>☻ TRAINER CARD ☻</h2>
      <div class="stars">★★★★★</div>
    </div>

    <div class="info">
      <div class="details">
        <p><span class="label">ID No.</span> 88826</p>
        <p><span class="label">NAME</span> Swift</p>
        <p><span class="label">MONEY</span> £579151</p>
        <p><span class="label">POKéDEX</span> 498</p>
        <p><span class="label">SCORE</span> 2162</p>
        <p><span class="label">TIME</span> 86:12</p>
        <p><span class="label">ADVENTURE STARTED</span> Dec. 14, 2020</p>
      </div>

      <div class="portrait">
        <img src="trainer.png" alt="Trainer">
      </div>
    </div>
  </div>
</body>
</html>
